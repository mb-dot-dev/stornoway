---
AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFront distribution for Stornoway website'

Parameters:
  ProjectName:
    Type: String
    Description: 'The name of the project, used for naming resources'
  DomainName:
    Type: String
    Description: 'The domain name and the S3 bucket name at the same time'
  BucketDomainName:
    Type: String
    Description: 'The domain name of the S3 bucket, used for the CloudFront origin'
  CertificateArn:
    Type: AWS::SSM::Parameter::Value<String>
    Description: 'The ARN of the ACM certificate for the domain, stored in SSM Parameter'
  
Outputs:
  CloudFrontDistributionId:
    Description: 'The ID of the CloudFront distribution'
    Value: !Ref CloudFrontDistribution
  CloudFrontDistributionArn:
    Description: 'The ARN of the CloudFront distribution'
    Value: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'
  CloudFrontDistributionDomainName:
    Description: 'The domain name of the CloudFront distribution'
    Value: !GetAtt CloudFrontDistribution.DomainName

Resources:
  CloudFrontCachePolicy:
    UpdateReplacePolicy: 'Delete'
    Type: 'AWS::CloudFront::CachePolicy'
    DeletionPolicy: 'Delete'
    Properties:
      CachePolicyConfig:
        Comment: 'Policy with caching enabled. Supports Gzip and Brotli compression.'
        MinTTL: 1
        MaxTTL: 3.1536E7
        ParametersInCacheKeyAndForwardedToOrigin:
          QueryStringsConfig:
            QueryStringBehavior: 'none'
          EnableAcceptEncodingBrotli: true
          HeadersConfig:
            HeaderBehavior: 'none'
          CookiesConfig:
            CookieBehavior: 'none'
          EnableAcceptEncodingGzip: true
        DefaultTTL: 86400
        Name: !Sub '${ProjectName}-CachingOptimized'

  CloudFrontDistribution:
    UpdateReplacePolicy: 'Delete'
    Type: 'AWS::CloudFront::Distribution'
    DeletionPolicy: 'Delete'
    Properties:
      DistributionConfig:
        Logging:
          IncludeCookies: false
          Bucket: ''
          Prefix: ''
        Comment: ''
        DefaultRootObject: ''
        Origins:
          - Id: !Ref BucketDomainName
            ConnectionTimeout: 10
            OriginAccessControlId: ''
            ConnectionAttempts: 3
            OriginCustomHeaders: []
            DomainName: !Ref BucketDomainName
            OriginShield:
              Enabled: false
            OriginPath: ''
            CustomOriginConfig:
              IpAddressType: 'ipv4'
              OriginReadTimeout: 30
              HTTPSPort: 443
              OriginKeepaliveTimeout: 5
              OriginSSLProtocols:
                - 'SSLv3'
                - 'TLSv1'
                - 'TLSv1.1'
                - 'TLSv1.2'
              HTTPPort: 80
              OriginProtocolPolicy: 'http-only'
        ViewerCertificate:
          MinimumProtocolVersion: 'TLSv1.2_2021'
          SslSupportMethod: 'sni-only'
          # CloudFrontDefaultCertificate: false
          AcmCertificateArn: !Ref CertificateArn
        PriceClass: 'PriceClass_All'
        DefaultCacheBehavior:
          Compress: true
          FunctionAssociations: []
          LambdaFunctionAssociations: []
          TargetOriginId: !Ref BucketDomainName
          ViewerProtocolPolicy: 'redirect-to-https'
          GrpcConfig:
            Enabled: false
          TrustedSigners: []
          FieldLevelEncryptionId: ''
          TrustedKeyGroups: []
          AllowedMethods:
            - 'HEAD'
            - 'GET'
          CachedMethods:
            - 'HEAD'
            - 'GET'
          SmoothStreaming: false
          CachePolicyId:
            Ref: 'CloudFrontCachePolicy'
        Staging: false
        CustomErrorResponses: []
        ContinuousDeploymentPolicyId: ''
        OriginGroups:
          Quantity: 0
          Items: []
        Enabled: true
        Aliases:
          - !Ref DomainName
        IPV6Enabled: true
        WebACLId: ''
        HttpVersion: 'http2'
        Restrictions:
          GeoRestriction:
            Locations: []
            RestrictionType: 'none'
        CacheBehaviors: []
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Name
          Value: !Ref ProjectName

name: Main

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

permissions:
  id-token: write # REQUIRED for OIDC
  contents: read

env:
  PROJECT_NAME: 'stornoway'
  DOMAIN_NAME: 'cv.molnarbence.dev'

jobs:
  prepare:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      project_name: ${{ steps.vars.outputs.project_name }}
      domain_name: ${{ steps.vars.outputs.domain_name }}
    steps:
      - id: vars
        run: |
          echo "project_name=${{ env.PROJECT_NAME }}" >> "$GITHUB_OUTPUT"
          echo "domain_name=${{ env.DOMAIN_NAME }}" >> "$GITHUB_OUTPUT"

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
      - name: Use Bun
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Check format
        run: bun format:check
      - name: Lint
        run: bun lint
      #   - name: Test
      #     run: bun test
      - name: Generate static files
        run: bun generate
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: build
          path: dist
  
  cfn-lint:
    name: CloudFormation Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Cloud Formation Linter with Latest Version
        uses: scottbrenner/cfn-lint-action@v2
      - name: Print the Cloud Formation Linter Version & run Linter.
        run: |
          cfn-lint --version
          cfn-lint -t ./aws/*.yaml

  deploy-resource-group:
    name: Deploy Resource Group
    needs:
      - prepare
      - cfn-lint
    uses: mb-dot-dev/reusable-workflows/.github/workflows/deploy-cloudformation.yaml@main
    secrets: inherit
    with:
      stack-name: ${{ needs.prepare.outputs.project_name }}-resource-group
      template: aws/resource-group.yaml
      project: ${{ needs.prepare.outputs.project_name }}
      parameter-overrides: >-
        ProjectName=${{ needs.prepare.outputs.project_name }}

  deploy-bucket:
    name: Deploy S3 Bucket
    needs:
      - prepare
      - cfn-lint
    uses: mb-dot-dev/reusable-workflows/.github/workflows/deploy-cloudformation.yaml@main
    secrets: inherit
    with:
      stack-name: ${{ needs.prepare.outputs.project_name }}-bucket
      template: aws/bucket.yaml
      project: ${{ needs.prepare.outputs.project_name }}
      parameter-overrides: >-
        ProjectName=${{ needs.prepare.outputs.project_name }},
        DomainName=${{ needs.prepare.outputs.domain_name }}   

  deploy-cloudfront:
    name: Deploy CloudFront Distribution
    needs:
      - prepare
      - cfn-lint
    uses: mb-dot-dev/reusable-workflows/.github/workflows/deploy-cloudformation.yaml@main
    secrets: inherit
    with:
      stack-name: ${{ needs.prepare.outputs.project_name }}-cloudfront
      template: aws/cloudfront.yaml
      project: ${{ needs.prepare.outputs.project_name }}
      parameter-overrides: >-
        ProjectName=${{ needs.prepare.outputs.project_name }},
        DomainName=${{ needs.prepare.outputs.domain_name }}

  deploy-deploy-role:
    name: Deploy IAM Role for GitHub Actions
    needs:
      - prepare
      - cfn-lint
      - deploy-cloudfront
    uses: mb-dot-dev/reusable-workflows/.github/workflows/deploy-cloudformation.yaml@main
    secrets: inherit
    with:
      stack-name: ${{ needs.prepare.outputs.project_name }}-deploy-role
      template: aws/deploy-role.yaml
      project: ${{ needs.prepare.outputs.project_name }}
      parameter-overrides: >-
        ProjectName=${{ needs.prepare.outputs.project_name }},
        RoleName=${{ needs.prepare.outputs.project_name }}-deploy-static-content,
        DomainName=${{ needs.prepare.outputs.domain_name }},
        CloudFrontDistributionArn=${{ fromJSON(needs.deploy-cloudfront.outputs.stack-outputs-json).CloudFrontDistributionArn }}
 
  upsert-cloudflare:
    name: Upsert Cloudflare DNS Records
    needs:
      - prepare
      - cfn-lint
      - deploy-cloudfront
    uses: mb-dot-dev/reusable-workflows/.github/workflows/upsert-cloudflare-cname.yaml@main
    with:
      record-name: ${{ needs.prepare.outputs.domain_name }}
      record-content: ${{ fromJSON(needs.deploy-cloudfront.outputs.stack-outputs-json).CloudFrontDistributionDomainName }}
    secrets:
      zone: ${{ secrets.CLOUDFLARE_ZONE_ID }}
      token: ${{ secrets.CLOUDFLARE_TOKEN }}

  upload-to-s3:
    name: Upload static site to S3 bucket
    if: github.event_name == 'push'
    needs:
      - prepare
      - build
      - deploy-deploy-role
      - deploy-cloudfront
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: build
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ fromJSON(needs.deploy-deploy-role.outputs.stack-outputs-json).StaticContentDeployRoleArn }}
          aws-region: us-east-1

      - name: Deploy static site to S3 bucket
        run: aws s3 sync ./ s3://${{ needs.prepare.outputs.domain_name }} --delete

      - name: Invalidate cache
        run: aws cloudfront create-invalidation --distribution-id ${{ fromJSON(needs.deploy-cloudfront.outputs.stack-outputs-json).CloudFrontDistributionId }} --paths "/*"
